# Netlify configuration for officialroom38.com
# This file is honored when the project folder is dragged into Netlify
# or connected via Git.

[build]
  # No build step — this is a static site.
  publish = "."

# Clean URL for /worship/ while keeping worship.html as the canonical file.
[[redirects]]
  from = "/worship/"
  to = "/worship.html"
  status = 200

[[redirects]]
  from = "/worship"
  to = "/worship/"
  status = 301

# Branded custom 404 for any unmatched path.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
